name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "sergio/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e .

      - name: Run checks
        env:
          ARGUS_REQUIRE_DOCKER_TESTS: "1"
          ARGUS_S10_TEST_IMAGE: "busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"
        run: python3 scripts/check.py

      - name: Run S8 lineage scale battery
        run: python3 scripts/run_s8_lineage_scale_battery.py --evidence-file "$RUNNER_TEMP/s8-lineage-scale-evidence.json"

      - name: Upload S8 lineage scale evidence
        uses: actions/upload-artifact@v4
        with:
          name: s8-lineage-scale-evidence
          path: ${{ runner.temp }}/s8-lineage-scale-evidence.json

      - name: Run M0 spine battery
        env:
          ARGUS_S10_TEST_IMAGE: "busybox@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662"
        run: python3 scripts/run_m0_spine_battery.py --evidence-file m0-spine-evidence.json

      - name: Upload M0 spine evidence
        uses: actions/upload-artifact@v4
        with:
          name: m0-spine-evidence
          path: m0-spine-evidence.json
