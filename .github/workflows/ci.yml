name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "sergio/**"

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip 'jsonschema>=4.25,<5'

      - name: Run checks
        run: python3 scripts/check.py
