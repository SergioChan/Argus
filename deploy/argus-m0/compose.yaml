name: argus-m0

services:
  postgres:
    image: postgres@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
    networks:
      - argus-data
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-dev-password
    ports:
      - "127.0.0.1:${ARGUS_M0_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    networks:
      - argus-data
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: argus
      MINIO_ROOT_PASSWORD: argus-dev-password
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio-data:/data

  s8-writer:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-data
      - argus-services
    command: ["python", "-m", "argus_runtime.s8_writer_service"]
    environment:
      ARGUS_S8_HOST: "0.0.0.0"
      ARGUS_S8_PORT: "8080"
      ARGUS_S8_POSTGRES_DSN: postgresql://argus:argus-dev-password@postgres:5432/argus
      ARGUS_S8_POSTGRES_ROLE: argus_s8_ledger_writer
      ARGUS_S8_RUST_LEDGER_WRITER_CMD: /usr/local/bin/argus-s8-ledger-writer
      ARGUS_S8_CHECKPOINT_SIGNER_URL: http://s10-supervisor:8080/v1/internal/s8-checkpoint-signatures
      ARGUS_S8_CHECKPOINT_SIGNER_AUTH_TOKEN: ${ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN:?ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN is required}
      ARGUS_S8_ALLOW_INSECURE_CHECKPOINT_SIGNER: "1"
      ARGUS_S8_REQUIRE_REPORT_VERIFIER: "1"
      ARGUS_S8_S10_VERIFIER_KEYS_URL: http://s10-supervisor:8080/v1/internal/verifier-keys
      ARGUS_S8_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_S8_ALLOW_INSECURE_VERIFIER_KEY_STORE: "1"
      ARGUS_S8_APPLY_MIGRATIONS: "1"
      ARGUS_S8_MIGRATIONS_DIR: /app/db/s8
      ARGUS_S8_MINIO_ENDPOINT: minio:9000
      ARGUS_S8_MINIO_ACCESS_KEY: argus
      ARGUS_S8_MINIO_SECRET_KEY: argus-dev-password
      ARGUS_S8_MINIO_BUCKET: argus-s8-objects
      ARGUS_S8_MINIO_SECURE: "0"
      ARGUS_RUNTIME_BOOTSTRAP_TOKEN: ${ARGUS_RUNTIME_BOOTSTRAP_TOKEN:?ARGUS_RUNTIME_BOOTSTRAP_TOKEN is required}
      ARGUS_RUNTIME_IDENTITY_SIGNING_KEY: ${ARGUS_RUNTIME_IDENTITY_SIGNING_KEY:?ARGUS_RUNTIME_IDENTITY_SIGNING_KEY is required}
      ARGUS_S8_BROKER_WRITE_KEY: ${ARGUS_S8_BROKER_WRITE_KEY:?ARGUS_S8_BROKER_WRITE_KEY is required}
      ARGUS_M0_HEALTH_TOKEN: ${ARGUS_M0_HEALTH_TOKEN:?ARGUS_M0_HEALTH_TOKEN is required}
    ports:
      - "127.0.0.1:${ARGUS_M0_S8_PORT:-58080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization': 'Bearer ' + os.environ['ARGUS_M0_HEALTH_TOKEN']}); assert json.load(urllib.request.urlopen(req))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s10-reference-model-provider:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-model
    command: ["python", "-m", "argus_runtime.s10_reference_model_provider_service"]
    environment:
      ARGUS_S10_REFERENCE_MODEL_HOST: "0.0.0.0"
      ARGUS_S10_REFERENCE_MODEL_PORT: "8080"
      ARGUS_S10_REFERENCE_MODEL_ID: argus-reference-model-v1
      ARGUS_S10_REFERENCE_MODEL_CREDENTIAL_HEADER: X-Argus-Model-Credential
      ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL: ${ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL:?ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL is required}
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s10-reference-security-pager:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-services
    command: ["python", "-m", "argus_runtime.s10_reference_security_pager_service"]
    environment:
      ARGUS_S10_REFERENCE_SECURITY_PAGER_HOST: "0.0.0.0"
      ARGUS_S10_REFERENCE_SECURITY_PAGER_PORT: "8080"
      ARGUS_S10_SECURITY_PAGER_AUTH_TOKEN: ${ARGUS_S10_SECURITY_PAGER_AUTH_TOKEN:?ARGUS_S10_SECURITY_PAGER_AUTH_TOKEN is required}
      ARGUS_S10_SECURITY_PAGER_READ_TOKEN: ${ARGUS_S10_SECURITY_PAGER_READ_TOKEN:?ARGUS_S10_SECURITY_PAGER_READ_TOKEN is required}
      ARGUS_S10_REFERENCE_SECURITY_PAGER_ENABLE_TEST_CONTROL: ${ARGUS_S10_REFERENCE_SECURITY_PAGER_ENABLE_TEST_CONTROL:-0}
      ARGUS_S10_REFERENCE_SECURITY_PAGER_HOLD_DELIVERIES: ${ARGUS_S10_REFERENCE_SECURITY_PAGER_HOLD_DELIVERIES:-0}
    ports:
      - "127.0.0.1:${ARGUS_M0_S10_SECURITY_PAGER_PORT:-58085}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s10-security-monitor:
    profiles: ["host-security"]
    build:
      context: ../..
      dockerfile: deploy/argus-m0/security/s10-security-monitor.Dockerfile
    privileged: true
    pid: host
    networks:
      - argus-services
    environment:
      ARGUS_S10_SECURITY_MONITOR_AUTH_TOKEN: ${ARGUS_S10_SECURITY_MONITOR_AUTH_TOKEN:-}
      ARGUS_S10_GVISOR_SOCKET_PATH: /run/argus-gvisor/events.sock
      ARGUS_S10_GVISOR_LOG_ROOT: /host/var/log/argus-runsc
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - /etc:/host/etc:ro
      - /sys/kernel/debug:/sys/kernel/debug:ro
      - /sys/kernel/tracing:/sys/kernel/tracing:ro
      - /run/argus-gvisor:/run/argus-gvisor
      - /var/log/argus-runsc:/host/var/log/argus-runsc:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/argus-s10-security-monitor", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 20
    stop_grace_period: 5s

  s10-supervisor:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-data
      - argus-services
      - argus-model
    command: ["python", "-m", "argus_runtime.s10_supervisor_service"]
    environment:
      ARGUS_S10_HOST: "0.0.0.0"
      ARGUS_S10_PORT: "8080"
      ARGUS_S10_TOKEN_SIGNING_MODE: ed25519
      ARGUS_S10_TOKEN_SIGNER_KEY_ID: argus-m0-token-root
      ARGUS_S10_TOKEN_ED25519_PRIVATE_KEY_HEX: ${ARGUS_S10_TOKEN_ED25519_PRIVATE_KEY_HEX:?ARGUS_S10_TOKEN_ED25519_PRIVATE_KEY_HEX is required}
      ARGUS_S10_TOKEN_ED25519_PUBLIC_KEY_HEX: ${ARGUS_S10_TOKEN_ED25519_PUBLIC_KEY_HEX:?ARGUS_S10_TOKEN_ED25519_PUBLIC_KEY_HEX is required}
      ARGUS_S10_TOKEN_REVOCATION_STORE_PATH: /var/lib/argus/s10/token-revocations.jsonl
      ARGUS_S10_COSIGN_BIN: /usr/local/bin/cosign
      ARGUS_S10_COSIGN_PUBLIC_KEY_PATH: /etc/argus/s10/image-trust/cosign.pub
      ARGUS_S10_COSIGN_SIGNATURE_STORE_DIR: /etc/argus/s10/image-trust/signatures
      ARGUS_S10_COSIGN_EXPECTED_VERSION: v2.6.3
      ARGUS_S10_COSIGN_VERIFY_TIMEOUT_S: ${ARGUS_S10_COSIGN_VERIFY_TIMEOUT_S:-10.0}
      ARGUS_S10_POLICY_SIGNING_KEY: ${ARGUS_S10_POLICY_SIGNING_KEY:?ARGUS_S10_POLICY_SIGNING_KEY is required}
      ARGUS_S10_CHECKPOINT_SIGNER_KEY_ID: argus-m0-s8-checkpoint
      ARGUS_S10_CHECKPOINT_SIGNING_KEY: ${ARGUS_S10_CHECKPOINT_SIGNING_KEY:?ARGUS_S10_CHECKPOINT_SIGNING_KEY is required}
      ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN: ${ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN:?ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN is required}
      ARGUS_S10_C3_VERIFIER_KEYS_JSON: ${ARGUS_S10_C3_VERIFIER_KEYS_JSON:?ARGUS_S10_C3_VERIFIER_KEYS_JSON is required}
      ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_S10_QUOTA_POSTGRES_DSN: postgresql://argus:argus-dev-password@postgres:5432/argus
      ARGUS_S10_AUDIT_POSTGRES_DSN: postgresql://argus:argus-dev-password@postgres:5432/argus
      ARGUS_S10_AUDIT_POSTGRES_ROLE: s10_audit_writer
      ARGUS_S10_AUDIT_WRITER_BIN: /usr/local/bin/argus-s10-audit-ledger-writer
      ARGUS_S10_AUDIT_ANCHOR_URL: http://127.0.0.1:8080/v1/internal/audit-anchor
      ARGUS_S10_AUDIT_ANCHOR_AUTH_TOKEN: ${ARGUS_S10_AUDIT_ANCHOR_AUTH_TOKEN:?ARGUS_S10_AUDIT_ANCHOR_AUTH_TOKEN is required}
      ARGUS_S10_ALLOW_INSECURE_AUDIT_ANCHOR: "1"
      ARGUS_S10_AUDIT_API_WRITE_TOKEN: ${ARGUS_S10_AUDIT_API_WRITE_TOKEN:?ARGUS_S10_AUDIT_API_WRITE_TOKEN is required}
      ARGUS_S10_AUDIT_API_READ_TOKEN: ${ARGUS_S10_AUDIT_API_READ_TOKEN:?ARGUS_S10_AUDIT_API_READ_TOKEN is required}
      ARGUS_S10_QUARANTINE_REVIEW_TOKEN: ${ARGUS_S10_QUARANTINE_REVIEW_TOKEN:?ARGUS_S10_QUARANTINE_REVIEW_TOKEN is required}
      ARGUS_S10_FORENSIC_SPOOL_DIR: /var/lib/argus/s10/forensic-spool
      ARGUS_S10_SECURITY_PAGER_URL: http://s10-reference-security-pager:8080/v1/pages
      ARGUS_S10_SECURITY_PAGER_AUTH_TOKEN: ${ARGUS_S10_SECURITY_PAGER_AUTH_TOKEN:?ARGUS_S10_SECURITY_PAGER_AUTH_TOKEN is required}
      ARGUS_S10_ALLOW_INSECURE_SECURITY_PAGER: "1"
      ARGUS_S10_SECURITY_PAGER_TIMEOUT_S: ${ARGUS_S10_SECURITY_PAGER_TIMEOUT_S:-10.0}
      ARGUS_S10_APPLY_MIGRATIONS: "1"
      ARGUS_S10_MIGRATIONS_DIR: /app/db/s10
      ARGUS_S10_PRICE_TABLE_SIGNER_KEY_ID: argus-m0-price-table
      ARGUS_S10_PRICE_TABLE_SIGNING_KEY: ${ARGUS_S10_PRICE_TABLE_SIGNING_KEY:?ARGUS_S10_PRICE_TABLE_SIGNING_KEY is required}
      ARGUS_S10_PRICE_TABLE_VERSION: "0.1.0"
      ARGUS_S10_PRICE_TABLE_ISSUED_AT: ${ARGUS_S10_PRICE_TABLE_ISSUED_AT:?ARGUS_S10_PRICE_TABLE_ISSUED_AT is required}
      ARGUS_S10_PRICE_TABLE_EXPIRES_AT: ${ARGUS_S10_PRICE_TABLE_EXPIRES_AT:?ARGUS_S10_PRICE_TABLE_EXPIRES_AT is required}
      ARGUS_S10_PRICE_TABLE_USD_PER_CPU_SECOND: "0.002"
      ARGUS_S10_PRICE_TABLE_USD_PER_GPU_SECOND: "0"
      ARGUS_S10_PRICE_TABLE_USD_PER_1K_MODEL_TOKENS: "0.004"
      ARGUS_S10_METER_INTERVAL_S: ${ARGUS_S10_METER_INTERVAL_S:-1.0}
      ARGUS_S10_METER_GAP_HALT_S: ${ARGUS_S10_METER_GAP_HALT_S:-5.0}
      ARGUS_S10_DEFAULT_RUNTIME_CLASS: ${ARGUS_S10_DEFAULT_RUNTIME_CLASS:-docker}
      ARGUS_S10_EXFIL_SOFT_BYTES: ${ARGUS_S10_EXFIL_SOFT_BYTES:-67108864}
      ARGUS_S10_EXFIL_HARD_BYTES: ${ARGUS_S10_EXFIL_HARD_BYTES:-134217728}
      ARGUS_S10_GVISOR_RUNTIME_NAME: ${ARGUS_S10_GVISOR_RUNTIME_NAME:-}
      ARGUS_S10_GVISOR_SECCOMP_PROFILE_PATH: ${ARGUS_S10_GVISOR_SECCOMP_PROFILE_PATH:-}
      ARGUS_S10_GVISOR_KUBERNETES_RUNTIME_CLASS: ${ARGUS_S10_GVISOR_KUBERNETES_RUNTIME_CLASS:-gvisor}
      ARGUS_S10_GVISOR_KUBERNETES_SECCOMP_PROFILE: ${ARGUS_S10_GVISOR_KUBERNETES_SECCOMP_PROFILE:-argus/argus-gvisor-seccomp.json}
      ARGUS_S10_GVISOR_TRUST_MOUNTS_JSON: ${ARGUS_S10_GVISOR_TRUST_MOUNTS_JSON:-}
      ARGUS_S10_SECURITY_MONITOR_URL: ${ARGUS_S10_SECURITY_MONITOR_URL:-}
      ARGUS_S10_SECURITY_MONITOR_AUTH_TOKEN: ${ARGUS_S10_SECURITY_MONITOR_AUTH_TOKEN:-}
      ARGUS_S10_ALLOW_INSECURE_SECURITY_MONITOR: ${ARGUS_S10_ALLOW_INSECURE_SECURITY_MONITOR:-0}
      ARGUS_S10_SECURITY_MONITOR_TIMEOUT_S: ${ARGUS_S10_SECURITY_MONITOR_TIMEOUT_S:-1.0}
      ARGUS_S10_EGRESS_SIDECAR_IMAGE: ${ARGUS_S10_EGRESS_SIDECAR_IMAGE:-}
      ARGUS_S10_EGRESS_NETWORK_MODE: ${ARGUS_S10_EGRESS_NETWORK_MODE:-bridge}
      ARGUS_S10_EGRESS_LISTEN_PORT: ${ARGUS_S10_EGRESS_LISTEN_PORT:-15001}
      ARGUS_S10_EGRESS_PROXY_UID: ${ARGUS_S10_EGRESS_PROXY_UID:-65531}
      ARGUS_S10_EGRESS_PROXY_GID: ${ARGUS_S10_EGRESS_PROXY_GID:-65531}
      ARGUS_S10_SANDBOX_UID: ${ARGUS_S10_SANDBOX_UID:-65532}
      ARGUS_S10_EGRESS_DNS_SERVERS: ${ARGUS_S10_EGRESS_DNS_SERVERS:-}
      ARGUS_S10_EGRESS_DNS_PORT: ${ARGUS_S10_EGRESS_DNS_PORT:-53}
      ARGUS_RUNTIME_BOOTSTRAP_TOKEN: ${ARGUS_RUNTIME_BOOTSTRAP_TOKEN:?ARGUS_RUNTIME_BOOTSTRAP_TOKEN is required}
      ARGUS_RUNTIME_IDENTITY_SIGNING_KEY: ${ARGUS_RUNTIME_IDENTITY_SIGNING_KEY:?ARGUS_RUNTIME_IDENTITY_SIGNING_KEY is required}
      ARGUS_RUNTIME_IDENTITY_MINT_POLICY_JSON: ${ARGUS_RUNTIME_IDENTITY_MINT_POLICY_JSON:?ARGUS_RUNTIME_IDENTITY_MINT_POLICY_JSON is required}
      ARGUS_S8_BROKER_URL: http://s8-writer:8080/v1/internal/brokered-artifacts
      ARGUS_S8_BROKER_WRITE_KEY: ${ARGUS_S8_BROKER_WRITE_KEY:?ARGUS_S8_BROKER_WRITE_KEY is required}
      ARGUS_S10_ADAPTER_TARGETS_JSON: '{"gw_spectrum":{"endpoint_url":"http://s7-reference-adapter:8080/v1/reference-adapter/evaluate","credential_env":"ARGUS_S10_GW_SPECTRUM_BROKER_CREDENTIAL","credential_header":"X-Argus-Adapter-Credential"}}'
      ARGUS_S10_GW_SPECTRUM_BROKER_CREDENTIAL: ${ARGUS_S10_GW_SPECTRUM_BROKER_CREDENTIAL:?ARGUS_S10_GW_SPECTRUM_BROKER_CREDENTIAL is required}
      ARGUS_S10_MODEL_TARGETS_JSON: '{"argus-reference-model-v1":{"completion_url":"http://s10-reference-model-provider:8080/v1/messages","token_count_url":"http://s10-reference-model-provider:8080/v1/messages/count_tokens","credential_env":"ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL","credential_header":"X-Argus-Model-Credential","static_headers":{"Anthropic-Version":"2023-06-01"},"audience":"model"}}'
      ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL: ${ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL:?ARGUS_S10_REFERENCE_MODEL_BROKER_CREDENTIAL is required}
      ARGUS_M0_HEALTH_TOKEN: ${ARGUS_M0_HEALTH_TOKEN:?ARGUS_M0_HEALTH_TOKEN is required}
    ports:
      - "127.0.0.1:${ARGUS_M0_S10_PORT:-58081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - s10-token-state:/var/lib/argus/s10
      - ./security/argus-gvisor-seccomp.json:/etc/argus/s10/argus-gvisor-seccomp.json:ro
      - type: bind
        source: ${ARGUS_S10_IMAGE_TRUST_SOURCE_ROOT:-./security/image-trust}
        target: /etc/argus/s10/image-trust
        read_only: true
      - type: bind
        source: ${ARGUS_S10_GVISOR_TRUST_SOURCE_ROOT:-./security}
        target: ${ARGUS_S10_GVISOR_TRUST_SOURCE_ROOT_MOUNT_PATH:-/var/lib/argus/s10/trust-sources}
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      s8-writer:
        condition: service_healthy
      s10-reference-model-provider:
        condition: service_healthy
      s10-reference-security-pager:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization': 'Bearer ' + os.environ['ARGUS_M0_HEALTH_TOKEN']}); assert json.load(urllib.request.urlopen(req))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s3-reference-referee:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-services
    command: ["python", "-m", "argus_runtime.s3_reference_referee_service"]
    environment:
      ARGUS_S3_REFERENCE_REFEREE_HOST: "0.0.0.0"
      ARGUS_S3_REFERENCE_REFEREE_PORT: "8080"
      ARGUS_S3_REFERENCE_REFEREE_S10_URL: http://s10-supervisor:8080
      ARGUS_S3_REFERENCE_REFEREE_S8_URL: http://s8-writer:8080
      ARGUS_S3_REFERENCE_REFEREE_VERIFIER_KEY_ENDPOINT_URL: http://s10-supervisor:8080/v1/internal/verifier-keys
      ARGUS_S3_REFERENCE_REFEREE_ALLOW_INSECURE_VERIFIER_KEY_STORE: "1"
      ARGUS_S3_REFERENCE_REFEREE_REQUIRE_S1_REQUESTER: "1"
      ARGUS_S3_REFERENCE_REFEREE_CALLER_ID: m1-reference-s3
      ARGUS_S3_REFERENCE_REFEREE_JOB_ID: m1-reference-job
      ARGUS_S3_REFERENCE_REFEREE_SIGNER_KEY_ID: s3-reference-referee-key
      ARGUS_S3_REFERENCE_REFEREE_SIGNER_SECRET: ${ARGUS_S3_REFERENCE_REFEREE_SIGNER_SECRET:?ARGUS_S3_REFERENCE_REFEREE_SIGNER_SECRET is required}
      ARGUS_S3_REFERENCE_REFEREE_ACCESS_TOKEN: ${ARGUS_S3_REFERENCE_REFEREE_ACCESS_TOKEN:?ARGUS_S3_REFERENCE_REFEREE_ACCESS_TOKEN is required}
      ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_SCHEMA_ROOT: /app/schemas
    ports:
      - "127.0.0.1:${ARGUS_M0_S3_REFERENCE_REFEREE_PORT:-58083}:8080"
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s7-reference-adapter:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-services
    command: ["python", "-m", "argus_runtime.s7_reference_adapter_service"]
    environment:
      ARGUS_S7_REFERENCE_ADAPTER_HOST: "0.0.0.0"
      ARGUS_S7_REFERENCE_ADAPTER_PORT: "8080"
      ARGUS_S7_REFERENCE_ADAPTER_S10_URL: http://s10-supervisor:8080
      ARGUS_S7_REFERENCE_ADAPTER_S8_URL: http://s8-writer:8080
      ARGUS_S7_REFERENCE_ADAPTER_CALLER_ID: m1-reference-s7
      ARGUS_S7_REFERENCE_ADAPTER_JOB_ID: m1-reference-job
      ARGUS_S7_REFERENCE_ADAPTER_ACCESS_TOKEN: ${ARGUS_S7_REFERENCE_ADAPTER_ACCESS_TOKEN:?ARGUS_S7_REFERENCE_ADAPTER_ACCESS_TOKEN is required}
      ARGUS_S7_REFERENCE_ADAPTER_BROKER_CREDENTIAL: ${ARGUS_S10_GW_SPECTRUM_BROKER_CREDENTIAL:?ARGUS_S10_GW_SPECTRUM_BROKER_CREDENTIAL is required}
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s2-reference-builder:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    networks:
      - argus-services
    command: ["python", "-m", "argus_runtime.s2_reference_builder_service"]
    environment:
      ARGUS_S2_REFERENCE_BUILDER_HOST: "0.0.0.0"
      ARGUS_S2_REFERENCE_BUILDER_PORT: "8080"
