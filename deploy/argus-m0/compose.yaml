name: argus-m0

services:
  postgres:
    image: postgres@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-dev-password
    ports:
      - "${ARGUS_M0_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: argus
      MINIO_ROOT_PASSWORD: argus-dev-password
    ports:
      - "${ARGUS_M0_MINIO_PORT:-59000}:9000"
      - "${ARGUS_M0_MINIO_CONSOLE_PORT:-59001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio-data:/data

  s8-writer:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s8_writer_service"]
    environment:
      ARGUS_S8_HOST: "0.0.0.0"
      ARGUS_S8_PORT: "8080"
      ARGUS_S8_POSTGRES_DSN: postgresql://argus:argus-dev-password@postgres:5432/argus
      ARGUS_S8_POSTGRES_ROLE: argus_s8_ledger_writer
      ARGUS_S8_RUST_LEDGER_WRITER_CMD: /usr/local/bin/argus-s8-ledger-writer
      ARGUS_S8_CHECKPOINT_SIGNER_URL: http://s10-supervisor:8080/v1/internal/s8-checkpoint-signatures
      ARGUS_S8_CHECKPOINT_SIGNER_AUTH_TOKEN: ${ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN:?ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN is required}
      ARGUS_S8_ALLOW_INSECURE_CHECKPOINT_SIGNER: "1"
      ARGUS_S8_REQUIRE_REPORT_VERIFIER: "1"
      ARGUS_S8_S10_VERIFIER_KEYS_URL: http://s10-supervisor:8080/v1/internal/verifier-keys
      ARGUS_S8_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_S8_ALLOW_INSECURE_VERIFIER_KEY_STORE: "1"
      ARGUS_S8_APPLY_MIGRATIONS: "1"
      ARGUS_S8_MIGRATIONS_DIR: /app/db/s8
      ARGUS_S8_MINIO_ENDPOINT: minio:9000
      ARGUS_S8_MINIO_ACCESS_KEY: argus
      ARGUS_S8_MINIO_SECRET_KEY: argus-dev-password
      ARGUS_S8_MINIO_BUCKET: argus-s8-objects
      ARGUS_S8_MINIO_SECURE: "0"
      ARGUS_RUNTIME_BOOTSTRAP_TOKEN: ${ARGUS_RUNTIME_BOOTSTRAP_TOKEN:?ARGUS_RUNTIME_BOOTSTRAP_TOKEN is required}
      ARGUS_RUNTIME_IDENTITY_SIGNING_KEY: ${ARGUS_RUNTIME_IDENTITY_SIGNING_KEY:?ARGUS_RUNTIME_IDENTITY_SIGNING_KEY is required}
      ARGUS_S8_BROKER_WRITE_KEY: ${ARGUS_S8_BROKER_WRITE_KEY:?ARGUS_S8_BROKER_WRITE_KEY is required}
      ARGUS_M0_HEALTH_TOKEN: ${ARGUS_M0_HEALTH_TOKEN:?ARGUS_M0_HEALTH_TOKEN is required}
    ports:
      - "127.0.0.1:${ARGUS_M0_S8_PORT:-58080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization': 'Bearer ' + os.environ['ARGUS_M0_HEALTH_TOKEN']}); assert json.load(urllib.request.urlopen(req))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s10-supervisor:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s10_supervisor_service"]
    environment:
      ARGUS_S10_HOST: "0.0.0.0"
      ARGUS_S10_PORT: "8080"
      ARGUS_S10_TOKEN_SIGNING_MODE: ed25519
      ARGUS_S10_TOKEN_SIGNER_KEY_ID: argus-m0-token-root
      ARGUS_S10_TOKEN_ED25519_PRIVATE_KEY_HEX: ${ARGUS_S10_TOKEN_ED25519_PRIVATE_KEY_HEX:?ARGUS_S10_TOKEN_ED25519_PRIVATE_KEY_HEX is required}
      ARGUS_S10_TOKEN_ED25519_PUBLIC_KEY_HEX: ${ARGUS_S10_TOKEN_ED25519_PUBLIC_KEY_HEX:?ARGUS_S10_TOKEN_ED25519_PUBLIC_KEY_HEX is required}
      ARGUS_S10_TOKEN_REVOCATION_STORE_PATH: /var/lib/argus/s10/token-revocations.jsonl
      ARGUS_S10_POLICY_SIGNING_KEY: ${ARGUS_S10_POLICY_SIGNING_KEY:?ARGUS_S10_POLICY_SIGNING_KEY is required}
      ARGUS_S10_CHECKPOINT_SIGNER_KEY_ID: argus-m0-s8-checkpoint
      ARGUS_S10_CHECKPOINT_SIGNING_KEY: ${ARGUS_S10_CHECKPOINT_SIGNING_KEY:?ARGUS_S10_CHECKPOINT_SIGNING_KEY is required}
      ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN: ${ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN:?ARGUS_S10_CHECKPOINT_SIGNER_AUTH_TOKEN is required}
      ARGUS_S10_C3_VERIFIER_KEYS_JSON: ${ARGUS_S10_C3_VERIFIER_KEYS_JSON:?ARGUS_S10_C3_VERIFIER_KEYS_JSON is required}
      ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_S10_QUOTA_POSTGRES_DSN: postgresql://argus:argus-dev-password@postgres:5432/argus
      ARGUS_S10_APPLY_MIGRATIONS: "1"
      ARGUS_S10_MIGRATIONS_DIR: /app/db/s10
      ARGUS_S10_PRICE_TABLE_SIGNER_KEY_ID: argus-m0-price-table
      ARGUS_S10_PRICE_TABLE_SIGNING_KEY: ${ARGUS_S10_PRICE_TABLE_SIGNING_KEY:?ARGUS_S10_PRICE_TABLE_SIGNING_KEY is required}
      ARGUS_S10_PRICE_TABLE_VERSION: "0.1.0"
      ARGUS_S10_PRICE_TABLE_ISSUED_AT: ${ARGUS_S10_PRICE_TABLE_ISSUED_AT:?ARGUS_S10_PRICE_TABLE_ISSUED_AT is required}
      ARGUS_S10_PRICE_TABLE_EXPIRES_AT: ${ARGUS_S10_PRICE_TABLE_EXPIRES_AT:?ARGUS_S10_PRICE_TABLE_EXPIRES_AT is required}
      ARGUS_S10_PRICE_TABLE_USD_PER_CPU_SECOND: "0.002"
      ARGUS_S10_PRICE_TABLE_USD_PER_GPU_SECOND: "0"
      ARGUS_S10_PRICE_TABLE_USD_PER_1K_MODEL_TOKENS: "0.004"
      ARGUS_S10_METER_INTERVAL_S: ${ARGUS_S10_METER_INTERVAL_S:-1.0}
      ARGUS_S10_METER_GAP_HALT_S: ${ARGUS_S10_METER_GAP_HALT_S:-5.0}
      ARGUS_RUNTIME_BOOTSTRAP_TOKEN: ${ARGUS_RUNTIME_BOOTSTRAP_TOKEN:?ARGUS_RUNTIME_BOOTSTRAP_TOKEN is required}
      ARGUS_RUNTIME_IDENTITY_SIGNING_KEY: ${ARGUS_RUNTIME_IDENTITY_SIGNING_KEY:?ARGUS_RUNTIME_IDENTITY_SIGNING_KEY is required}
      ARGUS_RUNTIME_IDENTITY_MINT_POLICY_JSON: ${ARGUS_RUNTIME_IDENTITY_MINT_POLICY_JSON:?ARGUS_RUNTIME_IDENTITY_MINT_POLICY_JSON is required}
      ARGUS_S8_BROKER_URL: http://s8-writer:8080/v1/internal/brokered-artifacts
      ARGUS_S8_BROKER_WRITE_KEY: ${ARGUS_S8_BROKER_WRITE_KEY:?ARGUS_S8_BROKER_WRITE_KEY is required}
      ARGUS_M0_HEALTH_TOKEN: ${ARGUS_M0_HEALTH_TOKEN:?ARGUS_M0_HEALTH_TOKEN is required}
    ports:
      - "127.0.0.1:${ARGUS_M0_S10_PORT:-58081}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - s10-token-state:/var/lib/argus/s10
    depends_on:
      postgres:
        condition: service_healthy
      s8-writer:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, os, urllib.request; req=urllib.request.Request('http://127.0.0.1:8080/healthz', headers={'Authorization': 'Bearer ' + os.environ['ARGUS_M0_HEALTH_TOKEN']}); assert json.load(urllib.request.urlopen(req))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s3-reference-referee:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s3_reference_referee_service"]
    environment:
      ARGUS_S3_REFERENCE_REFEREE_HOST: "0.0.0.0"
      ARGUS_S3_REFERENCE_REFEREE_PORT: "8080"
      ARGUS_S3_REFERENCE_REFEREE_S10_URL: http://s10-supervisor:8080
      ARGUS_S3_REFERENCE_REFEREE_S8_URL: http://s8-writer:8080
      ARGUS_S3_REFERENCE_REFEREE_VERIFIER_KEY_ENDPOINT_URL: http://s10-supervisor:8080/v1/internal/verifier-keys
      ARGUS_S3_REFERENCE_REFEREE_ALLOW_INSECURE_VERIFIER_KEY_STORE: "1"
      ARGUS_S3_REFERENCE_REFEREE_REQUIRE_S1_REQUESTER: "1"
      ARGUS_S3_REFERENCE_REFEREE_CALLER_ID: m1-reference-s3
      ARGUS_S3_REFERENCE_REFEREE_JOB_ID: m1-reference-job
      ARGUS_S3_REFERENCE_REFEREE_SIGNER_KEY_ID: s3-reference-referee-key
      ARGUS_S3_REFERENCE_REFEREE_SIGNER_SECRET: ${ARGUS_S3_REFERENCE_REFEREE_SIGNER_SECRET:?ARGUS_S3_REFERENCE_REFEREE_SIGNER_SECRET is required}
      ARGUS_S3_REFERENCE_REFEREE_ACCESS_TOKEN: ${ARGUS_S3_REFERENCE_REFEREE_ACCESS_TOKEN:?ARGUS_S3_REFERENCE_REFEREE_ACCESS_TOKEN is required}
      ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_SCHEMA_ROOT: /app/schemas
    ports:
      - "127.0.0.1:${ARGUS_M0_S3_REFERENCE_REFEREE_PORT:-58083}:8080"
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s7-reference-adapter:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s7_reference_adapter_service"]
    environment:
      ARGUS_S7_REFERENCE_ADAPTER_HOST: "0.0.0.0"
      ARGUS_S7_REFERENCE_ADAPTER_PORT: "8080"
      ARGUS_S7_REFERENCE_ADAPTER_S10_URL: http://s10-supervisor:8080
      ARGUS_S7_REFERENCE_ADAPTER_S8_URL: http://s8-writer:8080
      ARGUS_S7_REFERENCE_ADAPTER_CALLER_ID: m1-reference-s7
      ARGUS_S7_REFERENCE_ADAPTER_JOB_ID: m1-reference-job
      ARGUS_S7_REFERENCE_ADAPTER_ACCESS_TOKEN: ${ARGUS_S7_REFERENCE_ADAPTER_ACCESS_TOKEN:?ARGUS_S7_REFERENCE_ADAPTER_ACCESS_TOKEN is required}
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s2-reference-builder:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s2_reference_builder_service"]
    environment:
      ARGUS_S2_REFERENCE_BUILDER_HOST: "0.0.0.0"
      ARGUS_S2_REFERENCE_BUILDER_PORT: "8080"
      ARGUS_S2_REFERENCE_BUILDER_S10_URL: http://s10-supervisor:8080
      ARGUS_S2_REFERENCE_BUILDER_S8_URL: http://s8-writer:8080
      ARGUS_S2_REFERENCE_BUILDER_REQUIRE_S1_REQUESTER: "1"
      ARGUS_S2_REFERENCE_BUILDER_CALLER_ID: m1-reference-s2
      ARGUS_S2_REFERENCE_BUILDER_JOB_ID: m1-reference-job
      ARGUS_S2_REFERENCE_BUILDER_ACCESS_TOKEN: ${ARGUS_S2_REFERENCE_BUILDER_ACCESS_TOKEN:?ARGUS_S2_REFERENCE_BUILDER_ACCESS_TOKEN is required}
    ports:
      - "127.0.0.1:${ARGUS_M0_S2_REFERENCE_BUILDER_PORT:-58084}:8080"
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s11-reference-observatory:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s11_reference_observatory_service"]
    environment:
      ARGUS_S11_REFERENCE_OBSERVATORY_HOST: "0.0.0.0"
      ARGUS_S11_REFERENCE_OBSERVATORY_PORT: "8080"
      ARGUS_S11_REFERENCE_OBSERVATORY_S10_URL: http://s10-supervisor:8080
      ARGUS_S11_REFERENCE_OBSERVATORY_S8_URL: http://s8-writer:8080
      ARGUS_S11_REFERENCE_OBSERVATORY_VERIFIER_KEY_ENDPOINT_URL: http://s10-supervisor:8080/v1/internal/verifier-keys
      ARGUS_S11_REFERENCE_OBSERVATORY_ALLOW_INSECURE_VERIFIER_KEY_STORE: "1"
      ARGUS_S11_REFERENCE_OBSERVATORY_CALLER_ID: m1-reference-s11
      ARGUS_S11_REFERENCE_OBSERVATORY_JOB_ID: m1-reference-job
      ARGUS_S11_REFERENCE_OBSERVATORY_ACCESS_TOKEN: ${ARGUS_S11_REFERENCE_OBSERVATORY_ACCESS_TOKEN:?ARGUS_S11_REFERENCE_OBSERVATORY_ACCESS_TOKEN is required}
      ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_SCHEMA_ROOT: /app/schemas
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20

  s1-reference-demo:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s1_reference_demo_service", "--serve"]
    environment:
      ARGUS_S1_REFERENCE_DEMO_HOST: "0.0.0.0"
      ARGUS_S1_REFERENCE_DEMO_PORT: "8080"
      ARGUS_S1_REFERENCE_DEMO_S10_URL: http://s10-supervisor:8080
      ARGUS_S1_REFERENCE_DEMO_S8_URL: http://s8-writer:8080
      ARGUS_S1_REFERENCE_DEMO_S7_URL: http://s7-reference-adapter:8080
      ARGUS_S1_REFERENCE_DEMO_S2_URL: http://s2-reference-builder:8080
      ARGUS_S1_REFERENCE_DEMO_S3_URL: http://s3-reference-referee:8080
      ARGUS_S1_REFERENCE_DEMO_S11_URL: http://s11-reference-observatory:8080
      ARGUS_S1_REFERENCE_DEMO_VERIFIER_KEY_ENDPOINT_URL: http://s10-supervisor:8080/v1/internal/verifier-keys
      ARGUS_S1_REFERENCE_DEMO_ALLOW_INSECURE_VERIFIER_KEY_STORE: "1"
      ARGUS_S1_REFERENCE_DEMO_ACCESS_TOKEN: ${ARGUS_S1_REFERENCE_DEMO_ACCESS_TOKEN:?ARGUS_S1_REFERENCE_DEMO_ACCESS_TOKEN is required}
      ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN: ${ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN:?ARGUS_S10_VERIFIER_KEY_AUTH_TOKEN is required}
      ARGUS_SCHEMA_ROOT: /app/schemas
    ports:
      - "127.0.0.1:${ARGUS_M0_S1_DEMO_PORT:-58082}:8080"
    depends_on:
      s8-writer:
        condition: service_healthy
      s10-supervisor:
        condition: service_healthy
      s3-reference-referee:
        condition: service_healthy
      s7-reference-adapter:
        condition: service_healthy
      s2-reference-builder:
        condition: service_healthy
      s11-reference-observatory:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  postgres-data:
  minio-data:
  s10-token-state:
