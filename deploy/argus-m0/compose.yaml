name: argus-m0

services:
  postgres:
    image: postgres@sha256:7c688148e5e156d0e86df7ba8ae5a05a2386aaec1e2ad8e6d11bdf10504b1fb7
    environment:
      POSTGRES_DB: argus
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus-dev-password
    ports:
      - "${ARGUS_M0_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus -d argus"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: argus
      MINIO_ROOT_PASSWORD: argus-dev-password
    ports:
      - "${ARGUS_M0_MINIO_PORT:-59000}:9000"
      - "${ARGUS_M0_MINIO_CONSOLE_PORT:-59001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio-data:/data

  s8-writer:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s8_writer_service"]
    environment:
      ARGUS_S8_DATA_DIR: /var/lib/argus/s8
      ARGUS_S8_PORT: "8080"
    ports:
      - "${ARGUS_M0_S8_PORT:-58080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ${ARGUS_M0_S8_DATA_DIR:-s8-data}:/var/lib/argus/s8

  s10-supervisor:
    build:
      context: ../..
      dockerfile: deploy/argus-m0/python-service.Dockerfile
    command: ["python", "-m", "argus_runtime.s10_supervisor_service"]
    environment:
      ARGUS_S8_DATA_DIR: /var/lib/argus/s8
      ARGUS_S10_PORT: "8080"
      ARGUS_S10_SIGNING_KEY: argus-m0-dev-signing-key
    ports:
      - "${ARGUS_M0_S10_PORT:-58081}:8080"
    depends_on:
      s8-writer:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - "python -c \"import json, urllib.request; assert json.load(urllib.request.urlopen('http://127.0.0.1:8080/healthz'))['status'] == 'ok'\""
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ${ARGUS_M0_S8_DATA_DIR:-s8-data}:/var/lib/argus/s8

volumes:
  postgres-data:
  minio-data:
  s8-data:
